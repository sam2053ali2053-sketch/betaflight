name: Build Raptor Betaflight Firmware

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt -y install build-essential git curl clang-18 python3 python-is-python3
        
    - name: Build Firmware for FOXEERF722V4
      run: |
        cd firmware/BETAFPVG473
        make arm_sdk_install
        make configs
        make TARGET=FOXEERF722V4 RL_TOOLS_ROOT=../../../.. GCC_REQUIRED_VERSION=13.2.1
        
    - name: Upload Hex File
      uses: actions/upload-artifact@v4
      with:
        name: FOXEERF722V4-Raptor-Firmware
        path: firmware/BETAFPVG473/obj/*.hex
